<body>


<style>
  .flight-page {
    --bg: #f4ede0;
    --ink: #2b241c;
    --text: #2b241c;
    --text-muted: #6b6255;
    --accent: #b5502e;
    --line: #ddd2bd;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    max-width: 100%;
    overflow-x: hidden;
  }

  .flight-page a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .home-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }
  .home-wrap::before {
    content: "";
    position: absolute;
    top: -10%;
    right: -10%;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(181, 80, 46, 0.16), transparent 70%);
    pointer-events: none;
  }

  .home {
    max-width: 480px;
    text-align: center;
  }
  .home .mark {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 500;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  .home .tagline {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 28px;
  }
  .home .intro {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--text-muted);
    margin: 0 0 40px;
  }

  .home-links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .home-links a {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.03em;
    text-decoration: none;
    color: var(--accent);
    border-bottom: 1px solid transparent;
  }
  .home-links a:hover { border-bottom-color: var(--accent); }
  .home-links .primary {
    font-size: 14px;
    padding: 10px 22px;
    border: 1px solid var(--accent);
    border-radius: 3px;
  }
  .home-links .primary:hover { background: var(--accent); color: var(--bg); }
</style>

<div class="flight-page">
  <div class="home-wrap">
    <div class="home">
      <div class="mark">Lyceum</div>
      <div class="tagline">A DIY liberal arts curriculum</div>
      <p class="intro">Seven themes. Five mediums each. No set order.</p>
      <div class="home-links">
        <a href="01.html" class="primary">Begin with No. 01 &rarr;</a>
        <a href="themes.html">All seven themes</a>
        <a href="about.html">How this works</a>
        <a href="why.html">Why liberal arts</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
